<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OPERLYTICS | Staff Login</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="dist/css/adminlte.min.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.login-page {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-color: #fdf0f5;
      background-image:
        linear-gradient(rgba(212,74,122,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,74,122,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1rem; position: relative;
      overflow-x: hidden; overflow-y: auto;
    }
    body::before {
      content: ''; position: fixed;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,74,122,0.10) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
    }

    .brand-top {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin-bottom: 1.2rem; position: relative; z-index: 10;
    }
    .brand-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #D44A7A 0%, #C11C84 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff; box-shadow: 0 4px 18px rgba(212,74,122,0.35);
    }
    .brand-name { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; color: #2d1a25; }
    .brand-name span { color: #D44A7A; }
    .brand-sub { font-size: 0.70rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(90,30,60,0.40); font-weight: 400; }

    .login-card {
      position: relative; z-index: 10; width: 100%; max-width: 440px;
      background: #fff; border: 1px solid rgba(212,74,122,0.15);
      border-radius: 16px; padding: 1.8rem 2rem 1.5rem;
      box-shadow: 0 4px 6px rgba(212,74,122,0.06), 0 20px 40px rgba(212,74,122,0.10);
    }

    .dots { display: flex; gap: 6px; margin-bottom: 1.6rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(212,74,122,0.15); }
    .dot.active { background: #D44A7A; box-shadow: 0 0 6px rgba(212,74,122,0.45); }

    .role-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(212,74,122,0.07); border: 1px solid rgba(212,74,122,0.18);
      border-radius: 20px; padding: 4px 12px 4px 8px;
      font-size: 0.69rem; font-weight: 600; letter-spacing: 0.13em;
      text-transform: uppercase; color: #C11C84; margin-bottom: 1rem;
    }
    .role-dot { width: 6px; height: 6px; border-radius: 50%; background: #D44A7A; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .card-title-text { font-size: 1.35rem; font-weight: 600; color: #2d1a25; margin-bottom: 0.3rem; }
    .card-subtitle-text { font-size: 0.82rem; color: rgba(90,30,60,0.45); margin-bottom: 1.2rem; }

    .alert-box {
      display: none; align-items: center; gap: 9px;
      background: #fff0f4; border: 1px solid rgba(212,74,122,0.25);
      border-radius: 10px; padding: 0.70rem 1rem;
      font-size: 0.82rem; color: #b8305e; margin-bottom: 1.2rem;
    }
    .alert-box.show { display: flex; }
    .alert-box i { flex-shrink: 0; }

    .field-group { margin-bottom: 1rem; }
    .field-label {
      display: block; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(90,30,60,0.50); margin-bottom: 0.5rem;
    }
    .field-group input {
      width: 100%; background: #fdf5f8 !important;
      border: 1px solid rgba(212,74,122,0.20) !important;
      border-radius: 10px !important; padding: 0.80rem 1rem !important;
      font-size: 0.88rem !important; color: #2d1a25 !important;
      font-family: 'Inter', sans-serif !important; outline: none !important;
      box-shadow: none !important;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s !important;
    }
    .field-group input::placeholder { color: rgba(180,100,130,0.40) !important; }
    .field-group input:focus {
      border-color: #D44A7A !important;
      box-shadow: 0 0 0 3px rgba(212,74,122,0.12) !important;
      background: #fff !important;
    }
    .field-group input.is-error { border-color: rgba(212,74,122,0.55) !important; }

    .mid-row { display: flex; align-items: center; margin: 0.8rem 0 1rem; }
    .remember-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .remember-wrap input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px; border: 1.5px solid rgba(212,74,122,0.30);
      border-radius: 4px; background: #fdf5f8; cursor: pointer;
      flex-shrink: 0; position: relative; transition: all 0.18s;
    }
    .remember-wrap input[type="checkbox"]:checked { background: #D44A7A; border-color: #D44A7A; }
    .remember-wrap input[type="checkbox"]:checked::after {
      content: ''; position: absolute; left: 4px; top: 1px;
      width: 5px; height: 9px; border: 2px solid #fff;
      border-top: none; border-left: none; transform: rotate(45deg);
    }
    .remember-text { font-size: 0.82rem; color: rgba(90,30,60,0.55); }

    .btn-signin {
      width: 100%; background: linear-gradient(135deg, #D44A7A 0%, #C11C84 100%);
      color: #fff; border: none; border-radius: 10px; padding: 0.88rem;
      font-family: 'Inter', sans-serif; font-size: 0.90rem; font-weight: 600;
      letter-spacing: 0.04em; cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 18px rgba(212,74,122,0.40);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-signin:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 8px 26px rgba(212,74,122,0.50); }
    .btn-signin:active { transform: translateY(0); opacity: 1; }
    .btn-signin:disabled { opacity: 0.60; cursor: not-allowed; transform: none !important; }

    .spinner {
      display: none; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1rem 0 0.8rem; font-size: 0.72rem; color: rgba(180,100,130,0.35);
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(212,74,122,0.10); }

    .alt-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 0.80rem; color: rgba(90,30,60,0.40); text-decoration: none; transition: color 0.18s;
    }
    .alt-link:hover { color: #D44A7A; }
    .alt-link i { font-size: 11px; }

    .card-footer-note {
      text-align: center; margin-top: 1.2rem; font-size: 0.72rem;
      color: rgba(180,100,130,0.45); letter-spacing: 0.06em;
    }
    .card-footer-note span { margin: 0 6px; }
  </style>
</head>

<body class="hold-transition login-page">

  <div class="brand-top">
    <div class="brand-icon">♛</div>
    <div class="brand-name">OPER<span>LYTICS</span></div>
    <div class="brand-sub">Point of Sale</div>
  </div>

  <div class="login-card">

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>

    <div class="role-badge">
      <div class="role-dot"></div>
      Staff Access
    </div>

    <p class="card-title-text">Welcome back</p>
    <p class="card-subtitle-text">Sign in to open your POS terminal</p>

    <div class="alert-box" id="alertBox">
      <i class="fas fa-circle-exclamation"></i>
      <span id="alertText">Invalid email or password.</span>
    </div>

    <!-- ✅ Posts email + password to login-staff.php -->
    <form action="Backend/Controllers/LoginController.php" method="POST" id="loginForm">

      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" name="email"
          placeholder="you@empresscafe.com" required autocomplete="email">
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" name="password"
          placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="mid-row">
        <label class="remember-wrap">
          <input type="checkbox" id="remember" name="remember">
          <span class="remember-text">Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn-signin" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Sign In</span>
      </button>

      
      <div class="divider">or</div>

      <a href="index.html" class="alt-link">
        <i class="fas fa-shield-halved"></i>
        Admin login
      </a>


    </form>

    <p class="card-footer-note">
      Staff portal <span>·</span> OPERLYTICS © 2026
    </p>

  </div>

<script src="plugins/jquery/jquery.min.js"></script>
<script src="plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="dist/js/adminlte.min.js"></script>
<script>
  const params     = new URLSearchParams(window.location.search);
  const errorParam = params.get('error');
  if (errorParam) {
    const box  = document.getElementById('alertBox');
    const text = document.getElementById('alertText');
    const msgs = {
      'invalid'      : 'Invalid email or password.',
      'unauthorized' : 'This account does not have staff access.',
    };
    text.textContent = msgs[errorParam] ?? 'Something went wrong. Please try again.';
    box.classList.add('show');
    document.getElementById('email').classList.add('is-error');
    document.getElementById('password').classList.add('is-error');
  }

  document.getElementById('loginForm').addEventListener('submit', function () {
    const btn = document.getElementById('submitBtn');
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('btnText').textContent   = 'Signing in…';
    btn.disabled = true;
  });

  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', function () {
      this.classList.remove('is-error');
      document.getElementById('alertBox').classList.remove('show');
    });
  });
</script>
</body>
</html>
